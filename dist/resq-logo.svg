<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c41e3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield -->
  <path d="M 150 80 L 220 40 L 250 35 L 280 40 L 350 80 L 350 160 Q 280 220 250 240 Q 220 220 150 160 Z" fill="none" stroke="#001f3f" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Shield fill - Left (Navy) -->
  <path d="M 150 80 L 250 45 L 250 240 Q 200 210 150 160 Z" fill="#001f3f"/>
  
  <!-- Shield fill - Right (Red) -->
  <path d="M 250 45 L 350 80 L 350 160 Q 300 210 250 240 Z" fill="#c41e3a"/>
  
  <!-- Siren on Red Side -->
  <circle cx="310" cy="100" r="12" fill="#ffffff"/>
  <path d="M 310 88 L 310 70" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <path d="M 320 92 L 335 80" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <path d="M 300 92 L 285 80" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Heartbeat on Red Side -->
  <path d="M 290 140 L 295 135 L 300 140 L 310 130 L 320 145" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Q on Navy Side -->
  <circle cx="190" cy="130" r="25" fill="none" stroke="#ffffff" stroke-width="4"/>
  <path d="M 205 155 L 218 168" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <text x="185" y="145" font-size="40" font-weight="bold" fill="#ffffff" font-family="Arial">Q</text>
  
  <!-- ResQ Text -->
  <text x="380" y="120" font-size="70" font-weight="bold" fill="#001f3f" font-family="Arial">Res</text>
  <text x="550" y="120" font-size="70" font-weight="bold" fill="#c41e3a" font-family="Arial">Q</text>
  
  <!-- Heartbeat line under text -->
  <path d="M 380 135 L 600 135" stroke="#c41e3a" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Tagline -->
  <text x="380" y="170" font-size="20" font-weight="bold" fill="#001f3f" font-family="Arial" letter-spacing="8">RESPOND</text>
  <text x="380" y="200" font-size="20" font-weight="bold" fill="#001f3f" font-family="Arial" letter-spacing="8">RESCUE</text>
  <text x="380" y="230" font-size="20" font-weight="bold" fill="#001f3f" font-family="Arial" letter-spacing="8">RESOLVE</text>
</svg>